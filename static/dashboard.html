<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Career Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">🚀 CareerAI</div>
      <ul>
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="roadmap.html">Roadmap</a></li>
        <li><a href="interview.html">Interview Practice</a></li>
        <li><a href="#">Settings</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Header -->
      <header>
        <h2>Welcome, <span id="userName">User</span> 👋</h2>
      </header>

      <!-- Profile Section -->
      <section class="profile-section">
        <h3>🧑‍💼 Profile Details</h3>
        <form id="profileForm">
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="name" placeholder="Enter your name" />
            </div>
            <div class="form-group">
              <label>Experience</label>
              <input type="text" id="experience" placeholder="e.g. 2 years" />
            </div>
            <div class="form-group">
              <label>Education</label>
              <input type="text" id="education" placeholder="e.g. B.Tech CSE" />
            </div>
            <div class="form-group">
              <label>Domain</label>
              <input type="text" id="domain" placeholder="e.g. Web Development" />
            </div>
            <div class="form-group full">
              <label>Skills</label>
              <textarea id="skills" rows="2" placeholder="e.g. HTML, CSS, JS, React"></textarea>
            </div>
          </div>
          <button type="button" id="saveProfile">💾 Save Profile</button>
        </form>
      </section>

      <!-- Domain Intelligence Section -->
      <section class="domain-insights">
        <h3>🧭 Domain Intelligence & Career Insights</h3>
        <div class="domain-info">
          <p><strong>Detected Domain:</strong> <span id="detectedDomain">–</span></p>
        </div>
        <div class="roles-list" id="rolesList">
          <!-- 3D role cards inserted dynamically -->
        </div>
      </section>

      <!-- Skill Gap Meter -->
      <section class="skill-gap">
        <h3>📊 Skill Gap Meter</h3>
        <div class="meter-container">
          <div class="gauge">
            <div class="mask full"><div class="fill"></div></div>
            <div class="mask half"><div class="fill"></div></div>
            <div class="inside-circle">
              <span id="readinessPercent">0%</span>
              <p>Job Readiness</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Job & Salary Recommendations -->
      <section class="job-recommendations">
        <h3>💼 Job & Salary Recommendations</h3>
        <div id="jobList">
          <!-- Dynamic job roles & salaries -->
        </div>
      </section>

      <!-- Upskilling Recommendations -->
      <section class="upskill-recommendations">
        <h3>🎯 Upskilling Recommendations</h3>
        <div id="upskillList">
          <!-- Dynamic missing skills -->
        </div>
      </section>

      <!-- AI Chat Assistant Floating Widget -->
      <div id="aiChatWidget">
        <div id="chatToggle">💬</div>
        <div id="chatBox">
          <div id="chatHeader">AI Career Assistant</div>
          <div id="chatMessages"></div>
          <input type="text" id="chatInput" placeholder="Ask me about career, skills..." />
        </div>
      </div>

    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
